<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AeroGlobal - Book Flights Live</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f7f6; margin: 0; text-align: center; }
        header { background: #0a2540; color: white; padding: 20px; font-size: 24px; font-weight: bold; }
        .box { background: white; max-width: 400px; margin: 40px auto; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        input, button { width: 90%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 6px; }
        button { background: #00d4b1; border: none; font-weight: bold; cursor: pointer; color: #0a2540; }
    </style>
</head>
<body>

    <header>✈️ AeroGlobal Flight Portal</header>

    <div class="box">
        <h2>Book a Flight</h2>
        <input type="email" id="email" placeholder="Your Email Address">
        <input type="text" id="from" placeholder="From (e.g. Lagos)">
        <input type="text" id="to" placeholder="To (e.g. London)">
        <input type="date" id="date">
        <button onclick="submitBooking()">Book Flight Now</button>
        <p id="result"></p>
    </div>

    <script>
        async function submitBooking() {
            const email = document.getElementById('email').value;
            const from = document.getElementById('from').value;
            const to = document.getElementById('to').value;
            const date = document.getElementById('date').value;
            const result = document.getElementById('result');

            if(!email || !from || !to) {
                alert('Please fill in all details!');
                return;
            }

            result.innerText = "Booking your flight and sending emails...";

            try {
                // REPLACE THIS LINK WITH YOUR RENDER URL!
                const response = await fetch('https://my-flight-brain.onrender.com/book', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, from, to, date })
                });

                const data = await response.json();

                if(data.success) {
                    result.style.color = "green";
                    result.innerHTML = `<strong>Success!</strong><br>Ticket Code: <b>${data.code}</b><br>Check your inbox!`;
                } else {
                    result.style.color = "red";
                    result.innerText = "Error booking flight. Try again.";
                }
            } catch(err) {
                result.style.color = "red";
                result.innerText = "Failed to connect to backend brain.";
            }
        }
    </script>
</body>
</html>
